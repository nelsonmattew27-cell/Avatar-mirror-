<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Test</title>
</head>
<body style="margin:0;background:black;color:white;font-family:Arial;">
  <h2 style="padding:16px;">Camera Test</h2>
  <video id="cam" autoplay playsinline muted style="width:100%;max-width:500px;"></video>
  <p id="msg" style="padding:16px;">Starting...</p>

  <script>
    const video = document.getElementById('cam');
    const msg = document.getElementById('msg');

    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      .then(stream => {
        video.srcObject = stream;
        msg.textContent = "Camera works.";
      })
      .catch(err => {
        msg.textContent = "Error: " + err.name + " - " + err.message;
      });
  </script>
</body>
</html>
