<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Mirror</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    h1 {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      font-size: 20px;
      margin: 0;
    }

    #cam {
      display: none;
    }

    #canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Avatar Mirror</h1>
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js)"></script>
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js)"></script>
  <script src="main.js"></script>
</body>
</html>
